name: Boundary or safety concern
description: Report a possible public/private boundary leak or support-scope risk.
title: "[Boundary]: "
labels:
  - boundary
body:
  - type: markdown
    attributes:
      value: |
        Use this for possible leaks or support-boundary risks.

        If the report contains a real secret, credential, private prompt, customer data, production output, or proprietary artifact, do not open a public issue. Use GitHub private vulnerability reporting instead.

        For public issues, describe the concern without reproducing sensitive material.
  - type: dropdown
    id: concern
    attributes:
      label: Concern type
      options:
        - Possible placeholder or token-like pattern, no raw secret included
        - Possible private product logic
        - Possible private prompt or regression case
        - Possible support-scope creep
        - Other public/private boundary concern
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Give the file/path and a brief public-safe description.
    validations:
      required: true
  - type: checkboxes
    id: handling
    attributes:
      label: Handling
      options:
        - label: I avoided posting raw sensitive material.
          required: true
